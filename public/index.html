<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SuperChat AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #121212;
    --bg-raised: #1a1a1a;
    --bg-panel: #1e1e1e;
    --border: #2b2b2b;
    --border-soft: #232323;
    --text: #ececec;
    --text-dim: #8a8a8a;
    --text-faint: #5c5c5c;
    --accent: #00ADD8;
    --accent-dim: #00ADD833;
    --accent-glow: #00ADD855;
    --user-bubble: #232323;
    --radius: 14px;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body{
    background-image:
      radial-gradient(circle at 12% 8%, rgba(0,173,216,0.07), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(0,173,216,0.05), transparent 45%);
  }

  .mono{ font-family: 'JetBrains Mono', monospace; }

  ::-webkit-scrollbar{ width: 8px; }
  ::-webkit-scrollbar-track{ background: transparent; }
  ::-webkit-scrollbar-thumb{ background: #333; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover{ background: #444; }

  /* ---------- layout ---------- */

  .app{
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header{
    border-bottom: 1px solid var(--border-soft);
    background: linear-gradient(180deg, var(--bg-raised), var(--bg));
    flex-shrink: 0;
  }

  .header-inner{
    max-width: 860px;
    margin: 0 auto;
    padding: 22px 24px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .mark{
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }

  .mark::after{
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: 10px;
    padding: 1px;
    background: linear-gradient(135deg, var(--accent), transparent 60%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: .5;
  }

  .mark svg{ width: 20px; height: 20px; }

  .title-block h1{
    margin: 0;
    font-size: 19px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .title-block h1 span{
    color: var(--accent);
    font-weight: 500;
  }

  .title-block p{
    margin: 3px 0 0;
    font-size: 12.5px;
    color: var(--text-faint);
    letter-spacing: 0.02em;
  }

  .status-pill{
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11.5px;
    color: var(--text-dim);
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--bg-panel);
    flex-shrink: 0;
    white-space: nowrap;
  }

  .status-dot{
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #3ddc84;
    box-shadow: 0 0 6px #3ddc8499;
    flex-shrink: 0;
  }

  /* ---------- main / chat ---------- */

  main{
    flex: 1;
    min-height: 0;
    display: flex;
    justify-content: center;
    padding: 0 24px;
  }

  .chat-column{
    width: 100%;
    max-width: 860px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  #chat{
    flex: 1;
    overflow-y: auto;
    padding: 28px 2px 20px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    scroll-behavior: smooth;
  }

  /* empty state */
  .empty-state{
    margin: auto;
    text-align: center;
    color: var(--text-faint);
    padding: 40px 20px;
  }

  .empty-state .glyph{
    width: 46px;
    height: 46px;
    margin: 0 auto 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    opacity: 0.8;
  }

  .empty-state h2{
    font-size: 15px;
    font-weight: 500;
    color: var(--text-dim);
    margin: 0 0 6px;
  }

  .empty-state p{
    font-size: 13px;
    margin: 0;
    line-height: 1.6;
  }

  /* message rows */
  .msg-row{
    display: flex;
    gap: 12px;
    max-width: 100%;
    animation: rise .28s ease both;
  }

  @keyframes rise{
    from{ opacity: 0; transform: translateY(6px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .msg-row.user{
    flex-direction: row-reverse;
  }

  .avatar{
    width: 30px;
    height: 30px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    margin-top: 2px;
  }

  .avatar.ai{
    background: var(--accent-dim);
    border: 1px solid var(--accent-glow);
    color: var(--accent);
  }

  .avatar.user{
    background: #2a2a2a;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .bubble-wrap{
    display: flex;
    flex-direction: column;
    max-width: min(78%, 620px);
  }

  .msg-row.user .bubble-wrap{ align-items: flex-end; }

  .sender-label{
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 6px;
    padding: 0 2px;
    letter-spacing: 0.02em;
  }

  .bubble{
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg-row.ai .bubble{
    background: var(--bg-panel);
    border: 1px solid var(--border-soft);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg-row.user .bubble{
    background: var(--user-bubble);
    border: 1px solid var(--border);
    border-top-right-radius: 4px;
    color: #f2f2f2;
  }

  /* typing indicator */
  .typing{
    display: flex;
    gap: 4px;
    padding: 14px 16px;
  }

  .typing span{
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: .5;
    animation: blink 1.1s infinite;
  }

  .typing span:nth-child(2){ animation-delay: .15s; }
  .typing span:nth-child(3){ animation-delay: .3s; }

  @keyframes blink{
    0%, 80%, 100%{ opacity: .25; transform: translateY(0); }
    40%{ opacity: 1; transform: translateY(-2px); }
  }

  /* ---------- composer ---------- */

  .composer-wrap{
    flex-shrink: 0;
    padding: 14px 2px 22px;
    background: linear-gradient(180deg, transparent, var(--bg) 30%);
  }

  .composer{
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 10px 10px 10px 18px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    transition: border-color .18s ease, box-shadow .18s ease;
  }

  .composer:focus-within{
    border-color: var(--accent-glow);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  textarea{
    resize: none;
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14.5px;
    line-height: 1.55;
    padding: 8px 0;
    max-height: 160px;
  }

  textarea::placeholder{ color: var(--text-faint); }

  #send{
    background: var(--accent);
    color: #06222a;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform .15s ease, background .15s ease, opacity .15s ease;
  }

  #send svg{ width: 17px; height: 17px; }

  #send:hover{ background: #1ec2ea; }
  #send:active{ transform: scale(0.92); }

  #send:disabled{
    opacity: .35;
    cursor: default;
    transform: none;
  }

  .hint{
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 10px;
    letter-spacing: 0.01em;
  }

  .hint kbd{
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10.5px;
    color: var(--text-dim);
  }

  /* ---------- responsive ---------- */

  @media (max-width: 640px){
    .header-inner{ padding: 16px 16px 14px; gap: 10px; }
    .title-block h1{ font-size: 16.5px; }
    .title-block p{ display: none; }
    .status-pill span.pill-label{ display: none; }
    .status-pill{ padding: 6px 8px; }
    main{ padding: 0 12px; }
    #chat{ padding: 18px 0 14px; gap: 16px; }
    .bubble-wrap{ max-width: 88%; }
    .composer-wrap{ padding: 10px 0 16px; }
    .composer{ padding: 8px 8px 8px 14px; border-radius: 16px; }
    #send{ width: 36px; height: 36px; }
    .hint{ display: none; }
  }

  @media (max-width: 380px){
    .avatar{ width: 26px; height: 26px; }
  }

  @media (prefers-reduced-motion: reduce){
    .msg-row{ animation: none; }
    .typing span{ animation: none; opacity: .6; }
  }
</style>
</head>

<body>

<div class="app">

  <header>
    <div class="header-inner">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12C20 16.42 16.42 20 12 20H6.5L4 22.5V12Z" stroke="#00ADD8" stroke-width="1.6" stroke-linejoin="round"/>
          <circle cx="9" cy="12" r="1.1" fill="#00ADD8"/>
          <circle cx="12.5" cy="12" r="1.1" fill="#00ADD8"/>
          <circle cx="16" cy="12" r="1.1" fill="#00ADD8"/>
        </svg>
      </div>
      <div class="title-block">
        <h1>SuperChat <span>AI</span></h1>
        <p class="mono">Powered by Go + OpenAI</p>
      </div>
      <div class="status-pill">
        <span class="status-dot"></span>
        <span class="pill-label mono">online</span>
      </div>
    </div>
  </header>

  <main>
    <div class="chat-column">

      <div id="chat">
        <div class="empty-state">
          <div class="glyph">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12C20 16.42 16.42 20 12 20H6.5L4 22.5V12Z" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <h2>Comece uma conversa</h2>
          <p>Envie uma mensagem abaixo para falar<br/>com o assistente.</p>
        </div>
      </div>

      <div class="composer-wrap">
        <div class="composer">
          <textarea
            id="content"
            rows="1"
            placeholder="Envie uma mensagem..."
          ></textarea>

          <button id="send" aria-label="Enviar mensagem">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="hint">Enter para enviar &nbsp;·&nbsp; <kbd>Shift</kbd> + <kbd>Enter</kbd> para quebrar linha</div>
      </div>

    </div>
  </main>

</div>

<script>
  // auto-resize da textarea, mantém a UX de "campo que cresce" sem quebrar o app.js existente
  const contentEl = document.getElementById('content');
  if (contentEl) {
    contentEl.addEventListener('input', () => {
      contentEl.style.height = 'auto';
      contentEl.style.height = Math.min(contentEl.scrollHeight, 160) + 'px';
    });
  }
</script>

<script src="/public/app.js"></script>

</body>
</html>
